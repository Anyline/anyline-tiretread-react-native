import groovy.json.JsonSlurper

buildscript {
  def kotlin_version = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : project.properties["AnylineTtrMobileWrapperReactNative_kotlinVersion"]

  repositories {
    google()
    mavenCentral()
    maven { url "https://europe-maven.pkg.dev/anyline-ttr-sdk/maven" }
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.3"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
  }
}

plugins {
    id 'com.android.library'
    id 'kotlin-android'
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"

  react {
    // Keep codegen/new-arch enabled, but scope JS scanning to wrapper sources only.
    jsRootDir = file("../src/specs")
    libraryName = "AnylineTtrMobileWrapperReactNativeSpec"
    codegenJavaPackageName = "com.anyline.ttr.reactnative"
  }
}

def packageJson = new JsonSlurper().parse(file("../package.json"))
def packageVersion = packageJson.version.toString()

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["AnylineTtrMobileWrapperReactNative_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["AnylineTtrMobileWrapperReactNative_" + name]).toInteger()
}

def supportsNamespace() {
  def parsed = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')
  def major = parsed[0].toInteger()
  def minor = parsed[1].toInteger()

  return (major == 7 && minor >= 3) || major >= 8
}

def resolveReactNativeAndroidDir() {
  // Prefer host app React Native sources when this wrapper is built as an included project.
  if (rootProject != null && rootProject.projectDir != null) {
    def rootCandidates = [
      new File(rootProject.projectDir, "node_modules/react-native/android"),
      new File(rootProject.projectDir, "node_modules/react-native"),
      new File(rootProject.projectDir, "../node_modules/react-native/android"),
      new File(rootProject.projectDir, "../node_modules/react-native"),
      new File(rootProject.projectDir, "../../node_modules/react-native/android"),
      new File(rootProject.projectDir, "../../node_modules/react-native"),
    ]
    for (candidate in rootCandidates) {
      if (candidate.exists()) {
        return candidate
      }
    }
  }

  if (rootProject.ext.has("reactNativeAndroidRoot")) {
    def configuredDir = file(rootProject.ext.get("reactNativeAndroidRoot"))
    if (configuredDir.exists()) {
      return configuredDir
    }
  }

  def currentDir = projectDir
  0.upto(5) {
    if (currentDir == null) {
      return null
    }

    def androidDir = new File(currentDir, "node_modules/react-native/android")
    if (androidDir.exists()) {
      return androidDir
    }

    def legacyDir = new File(currentDir, "node_modules/react-native")
    if (legacyDir.exists()) {
      return legacyDir
    }

    currentDir = currentDir.parentFile
  }

  return null
}

def addReactNativeMavenRepo(RepositoryHandler repositories) {
  def reactNativeDir = resolveReactNativeAndroidDir()
  if (reactNativeDir != null && reactNativeDir.exists()) {
    repositories.maven {
      url reactNativeDir.toString()
      name "React Native sources"
    }
  } else {
    logger.warn(":${project.name}: unable to locate React Native android sources; falling back to remote repositories")
  }
}

android {
  if (supportsNamespace()) {
    namespace "com.anyline.ttr.reactnative"

    sourceSets {
      main {
        manifest.srcFile "src/main/AndroidManifestNew.xml"
      }
    }
  }

  packaging {
    resources.excludes += 'META-INF/LICENSE.md'
  }

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  buildFeatures {
    buildConfig true
  }

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
    buildConfigField "String", "WRAPPER_VERSION", "\"${packageVersion}\""
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  testOptions {
    unitTests {
      includeAndroidResources = true
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  sourceSets.main {
    java {
      if (isNewArchitectureEnabled()) {
        srcDirs += ["src/newarch/java"]
      } else {
        srcDirs += ["src/oldarch/java"]
      }
    }
  }
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  // Wrapper compiles against RN bridge types; new-arch plugin resolves concrete runtime artifacts.
  compileOnly "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
  implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3"

  implementation("io.anyline.tiretread.sdk:shared-android:15.0.0")

  testImplementation "com.facebook.react:react-android:0.76.9"
  testImplementation "junit:junit:4.13.2"
  testImplementation "org.jetbrains.kotlin:kotlin-test-junit:$kotlin_version"
  testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
  testImplementation "io.mockk:mockk:1.13.13"
}
